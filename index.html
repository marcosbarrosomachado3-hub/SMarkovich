<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Markovich Renda Fixa</title>
    <!-- Chart.js para o gráfico de evolução -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-principal: #1c1921; /* Roxo bem escuro / Grafite Rico */
            --bg-card: #25222b;      /* Roxo secundário */
            --cor-laranja: #ff5a00;  /* Laranja destaque Rico */
            --cor-texto: #ffffff;
            --cor-mutada: #a3a0a8;
            --borda: #332f3b;
            --abas-bg: #2d2935;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--borda);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        h1 span {
            color: var(--cor-laranja);
        }

        /* Sistema de Abas */
        .tabs {
            display: flex;
            margin-bottom: 25px;
            background-color: var(--abas-bg);
            border-radius: 8px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--cor-mutada);
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--cor-laranja);
            color: var(--cor-texto);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Layout em duas colunas */
        .painel-simulador {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .painel-simulador {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--cor-mutada);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-principal);
            border: 1px solid var(--borda);
            border-radius: 8px;
            color: var(--cor-texto);
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--cor-laranja);
        }

        .btn-simular {
            width: 100%;
            padding: 12px;
            background-color: var(--cor-laranja);
            border: none;
            border-radius: 8px;
            color: var(--cor-texto);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-simular:hover {
            background-color: #e04f00;
        }

        /* Resultados e Gráfico */
        .coluna-resultado {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .resultado-box {
            background-color: var(--bg-principal);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--borda);
            margin-bottom: 15px;
        }

        .res-linha {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .res-linha .valor {
            font-weight: bold;
            color: var(--cor-laranja);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 240px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador Markovich de <span>Renda Fixa</span></h1>

    <!-- Alternador de Abas -->
    <div class="tabs">
        <button class="tab-btn active" id="btn-rf" onclick="mudarAba('renda-fixa')">Renda Fixa</button>
        <button class="tab-btn" id="btn-rv" onclick="mudarAba('renda-variavel')">Renda Variável (Ações/FIIs)</button>
    </div>

    <div class="painel-simulador">
        
        <!-- FORMULÁRIOS DE ENTRADA -->
        <div class="coluna-inputs">
            
            <!-- ABA RENDA FIXA -->
            <div id="renda-fixa" class="tab-content active">
                <div class="form-group">
                    <label for="rf_produto">Produto de Renda Fixa</label>
                    <select id="rf_produto">
                        <option value="cdb">CDB (Pós-Fixado)</option>
                        <option value="lci">LCI / LCA (Isento de IR)</option>
                        <option value="tesouro">Tesouro Selic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rf_rentabilidade">% do CDI do Produto</label>
                    <input type="number" id="rf_rentabilidade" value="100">
                </div>
                <div class="form-group">
                    <label for="rf_cdi">Taxa CDI Atual (% ao ano)</label>
                    <input type="number" id="rf_cdi" value="10.5" step="0.01">
                </div>
            </div>

            <!-- ABA RENDA VARIÁVEL -->
            <div id="renda-variavel" class="tab-content">
                <div class="form-group">
                    <label for="rv_produto">Ativo Alvo</label>
                    <select id="rv_produto">
                        <option value="fii">Fundos Imobiliários (FIIs)</option>
                        <option value="acoes">Ações (Dividendos + Crescimento)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rv_dividendos">Dividend Yield Esperado (% ao ano)</label>
                    <input type="number" id="rv_dividendos" value="8.5" step="0.1">
                </div>
                <div class="form-group">
                    <label for="rv_valorizacao">Valorização Média das Cotas (% ao ano)</label>
                    <input type="number" id="rv_valorizacao" value="4.0" step="0.1">
                </div>
            </div>

            <!-- DADOS COMUNS -->
            <div class="form-group">
                <label for="valor_inicial">Aporte Inicial (R$)</label>
                <input type="number" id="valor_inicial" value="5000">
            </div>
            <div class="form-group">
                <label for="aporte_mensal">Aporte Recorrente Mensal (R$)</label>
                <input type="number" id="aporte_mensal" value="300">
            </div>
            <div class="form-group">
                <label for="prazo_meses">Prazo da Projeção (em meses)</label>
                <input type="number" id="prazo_meses" value="24">
            </div>

            <button class="btn-simular" onclick="calcularTudo()">Calcular Projeção</button>
        </div>

        <!-- EXIBIÇÃO DE RESULTADOS -->
        <div class="coluna-resultado">
            <div class="resultado-box">
                <div class="res-linha">
                    <span>Total Investido:</span>
                    <span id="res_total_investido" style="color: #fff;">R$ 0,00</span>
                </div>
                <div class="res-linha">
                    <span>Total Rendimentos Bruto:</span>
                    <span id="res_rendimento_bruto" style="color: #34d399;">R$ 0,00</span>
                </div>
                <div class="res-linha" id="linha_ir_container">
                    <span>Imposto de Renda Projetado:</span>
                    <span id="res_ir" style="color: #f87171;">R$ 0,00</span>
                </div>
                <div class="res-linha" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--borda); font-size: 16px;">
                    <span><strong>Valor Final Líquido:</strong></span>
                    <span id="res_final_liquido" class="valor">R$ 0,00</span>
                </div>
            </div>

            <!-- Canvas do Gráfico -->
            <div class="chart-container">
                <canvas id="graficoEvolucao"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
    let graficoInstancia = null;
    let abaAtiva = 'renda-fixa';

    function mudarAba(idAba) {
        abaAtiva = idAba;
        
        // Remove as classes ativas de todas as abas e botões
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        // Ativa os elementos corretos
        if (idAba === 'renda-fixa') {
            document.getElementById('btn-rf').classList.add('active');
            document.getElementById('renda-fixa').classList.add('active');
        } else {
            document.getElementById('btn-rv').classList.add('active');
            document.getElementById('renda-variavel').classList.add('active');
        }
