<script>
    let graficoInstancia = null;
    let abaAtiva = 'renda-fixa';
    let ultimoResultado = {}; // armazena dados para o PDF

    // ── Busca CDI via API do Banco Central ────────────────────────
    async function buscarCDI() {
        const dot    = document.getElementById('cdi_dot');
        const texto  = document.getElementById('cdi_texto');
        dot.className = 'cdi-dot load';
        texto.textContent = 'Buscando taxa do Banco Central...';
        try {
            // Série 4391 = CDI over anualizado (Banco Central do Brasil)
            const url = 'https://api.bcb.gov.br/dados/serie/bcdata.sgs.4391/dados/ultimos/1?formato=json';
            const res  = await fetch(url);
            const data = await res.json();
            if (data && data[0] && data[0].valor) {
                const taxa = parseFloat(data[0].valor.replace(',', '.'));
                const data_ref = data[0].data;
                document.getElementById('rf_cdi').value = taxa.toFixed(2);
                dot.className = 'cdi-dot ok';
                texto.textContent = `Taxa do BCB: ${taxa.toFixed(2)}% a.a. (ref. ${data_ref})`;
                calcularTudo();
            } else {
                throw new Error('Sem dados');
            }
        } catch(e) {
            dot.className = 'cdi-dot erro';
            texto.textContent = 'Não foi possível buscar. Usando valor manual.';
        }
    }

    // ── Validação da lógica matemática ────────────────────────────
    function validarEntradas() {
        const alerta = document.getElementById('alerta_validacao');
        const erros  = [];

        const valorInicial = parseFloat(document.getElementById('valor_inicial').value) || 0;
        const aporteMensal = parseFloat(document.getElementById('aporte_mensal').value) || 0;
        const prazoMeses   = parseInt(document.getElementById('prazo_meses').value)     || 0;

        if (valorInicial <= 0 && aporteMensal <= 0)
            erros.push('Informe ao menos um Aporte Inicial ou Aporte Mensal maior que zero.');
        if (prazoMeses < 1)
            erros.push('O prazo mínimo é de 1 mês.');
        if (prazoMeses > 360)
            erros.push('O prazo máximo é de 360 meses (30 anos).');

        if (abaAtiva === 'renda-fixa') {
            const cdi  = parseFloat(document.getElementById('rf_cdi').value)           || 0;
            const pct  = parseFloat(document.getElementById('rf_rentabilidade').value) || 0;
            if (cdi <= 0)  erros.push('A taxa CDI deve ser maior que zero.');
            if (pct <= 0)  erros.push('A rentabilidade (% do CDI) deve ser maior que zero.');
            if (pct > 200) erros.push('Rentabilidade acima de 200% do CDI é improvável — verifique o valor.');
        } else {
            const dy  = parseFloat(document.getElementById('rv_dividendos').value)  || 0;
            const val = parseFloat(document.getElementById('rv_valorizacao').value);
            if (dy < 0)   erros.push('O Dividend Yield não pode ser negativo.');
            if (dy > 50)  erros.push('Dividend Yield acima de 50% a.a. é improvável — verifique o valor.');
            if (val < -50) erros.push('Valorização abaixo de -50% a.a. é improvável — verifique o valor.');
        }

        if (erros.length > 0) {
            alerta.style.display = 'block';
            alerta.innerHTML = '⚠️ ' + erros.join('<br>⚠️ ');
            return false;
        } else {
            alerta.style.display = 'none';
            return true;
        }
    }

    // ── Exportar PDF ──────────────────────────────────────────────
    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });

        const laranja = [255, 90, 0];
        const cinza   = [100, 100, 110];
        const branco  = [255, 255, 255];
        const escuro  = [28, 25, 33];

        // Fundo
        doc.setFillColor(...escuro);
        doc.rect(0, 0, 210, 297, 'F');

        // Cabeçalho
        doc.setFillColor(...laranja);
        doc.rect(0, 0, 210, 22, 'F');
        doc.setTextColor(...branco);
        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.text('Simulador Markovich — Relatório de Simulação', 105, 14, { align: 'center' });

        // Data
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...cinza);
        doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 105, 29, { align: 'center' });

        // Tipo de simulação
        const tipo = abaAtiva === 'renda-fixa' ? '📊 Renda Fixa' : '📈 Renda Variável';
        doc.setFontSize(11);
        doc.setTextColor(...laranja);
        doc.setFont('helvetica', 'bold');
        doc.text(tipo, 15, 38);

        // Linha separadora
        doc.setDrawColor(...laranja);
        doc.setLineWidth(0.4);
        doc.line(15, 41, 195, 41);

        // Parâmetros da simulação
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...cinza);
        doc.text('PARÂMETROS', 15, 49);

        const params = [];
        if (abaAtiva === 'renda-fixa') {
            const produtos = { cdb: 'CDB (Pós-Fixado)', lci: 'LCI / LCA', tesouro: 'Tesouro Selic' };
            params.push(['Produto', produtos[document.getElementById('rf_produto').value]]);
            params.push(['Rentabilidade', document.getElementById('rf_rentabilidade').value + '% do CDI']);
            params.push(['Taxa CDI', document.getElementById('rf_cdi').value + '% a.a.']);
        } else {
            const ativos = { fii: 'Fundos Imobiliários (FIIs)', acoes: 'Ações' };
            params.push(['Ativo', ativos[document.getElementById('rv_produto').value]]);
            params.push(['Dividend Yield', document.getElementById('rv_dividendos').value + '% a.a.']);
            params.push(['Valorização', document.getElementById('rv_valorizacao').value + '% a.a.']);
        }
        params.push(['Aporte Inicial', fmt(parseFloat(document.getElementById('valor_inicial').value) || 0)]);
        params.push(['Aporte Mensal', fmt(parseFloat(document.getElementById('aporte_mensal').value) || 0)]);
        params.push(['Prazo', document.getElementById('prazo_meses').value + ' meses']);

        let y = 56;
        params.forEach(([chave, valor]) => {
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...cinza);
            doc.text(chave + ':', 15, y);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...branco);
            doc.text(valor, 75, y);
            y += 7;
        });

        // Linha separadora
        y += 2;
        doc.line(15, y, 195, y);
        y += 8;

        // Resultados
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...cinza);
        doc.text('RESULTADOS', 15, y);
        y += 7;

        const resultados = [
            ['Total Investido',         document.getElementById('res_total_investido').textContent,  branco],
            ['Rendimento Bruto',        document.getElementById('res_rendimento_bruto').textContent, [52, 211, 153]],
            ['IR Projetado',            document.getElementById('res_ir').textContent,               [248, 113, 113]],
            ['Valor Final Líquido',     document.getElementById('res_final_liquido').textContent,    laranja],
            ['Rentabilidade Líquida',   document.getElementById('res_rentabilidade_pct').textContent,[52, 211, 153]],
            ['Retorno Mensal Médio',    document.getElementById('res_mensal').textContent,           [52, 211, 153]],
        ];

        resultados.forEach(([chave, valor, cor]) => {
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...cinza);
            doc.text(chave + ':', 15, y);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...cor);
            doc.text(valor, 75, y);
            y += 7;
        });

        // Gráfico
        y += 4;
        doc.line(15, y, 195, y);
        y += 8;
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...cinza);
        doc.setFontSize(9);
        doc.text('GRÁFICO DE EVOLUÇÃO PATRIMONIAL', 15, y);
        y += 4;

        const canvas = document.getElementById('graficoEvolucao');
        const imgData = canvas.toDataURL('image/png');
        doc.addImage(imgData, 'PNG', 15, y, 180, 70);

        // Rodapé
        doc.setFontSize(7);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...cinza);
        doc.text('Simulador Markovich — marcosbarrosomachado3-hub.github.io/SMarkovich', 105, 290, { align: 'center' });
        doc.text('Este relatório é uma projeção estimada e não constitui recomendação de investimento.', 105, 294, { align: 'center' });

        doc.save('simulacao-markovich.pdf');
    }

    // ── Tabela regressiva de IR para renda fixa ──────────────────────
    function calcularAliquotaIR(meses) {
        if (meses <= 6)  return { aliquota: 0.225, descricao: 'até 180 dias → 22,5%' };
        if (meses <= 12) return { aliquota: 0.200, descricao: '181 a 360 dias → 20%' };
        if (meses <= 24) return { aliquota: 0.175, descricao: '361 a 720 dias → 17,5%' };
        return             { aliquota: 0.150, descricao: 'acima de 720 dias → 15%' };
    }

    // ── Formata número como moeda BRL ──────────────────────────────
    function fmt(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // ── Troca de aba ───────────────────────────────────────────────
    function mudarAba(idAba) {
        abaAtiva = idAba;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        if (idAba === 'renda-fixa') {
            document.getElementById('btn-rf').classList.add('active');
            document.getElementById('renda-fixa').classList.add('active');
        } else {
            document.getElementById('btn-rv').classList.add('active');
            document.getElementById('renda-variavel').classList.add('active');
        }
        calcularTudo();
    }

    // ── Cálculo principal ──────────────────────────────────────────
    function calcularTudo() {
        if (!validarEntradas()) return;
        const valorInicial  = parseFloat(document.getElementById('valor_inicial').value)  || 0;
        const aporteMensal  = parseFloat(document.getElementById('aporte_mensal').value)  || 0;
        const prazoMeses    = parseInt(document.getElementById('prazo_meses').value)       || 1;

        let saldoBruto      = valorInicial;
        let totalInvestido  = valorInicial;
        let rendimentoBruto = 0;
        let isento          = false;

        const evolucaoSaldo     = [valorInicial];
        const evolucaoInvestido = [valorInicial];
        const labels            = ['Início'];

        // ── RENDA FIXA ────────────────────────────────────────────
        if (abaAtiva === 'renda-fixa') {
            const produto        = document.getElementById('rf_produto').value;
            const pctCdi         = parseFloat(document.getElementById('rf_rentabilidade').value) / 100;
            const cdiAnual       = parseFloat(document.getElementById('rf_cdi').value)           / 100;
            const taxaMensal     = Math.pow(1 + cdiAnual * pctCdi, 1 / 12) - 1;

            isento = (produto === 'lci');

            for (let m = 1; m <= prazoMeses; m++) {
                saldoBruto     = (saldoBruto + aporteMensal) * (1 + taxaMensal);
                totalInvestido += aporteMensal;

                evolucaoSaldo.push(saldoBruto);
                evolucaoInvestido.push(totalInvestido);
                if (m % Math.max(1, Math.floor(prazoMeses / 12)) === 0 || m === prazoMeses) {
                    labels.push('Mês ' + m);
                } else {
                    labels.push('');
                }
            }

            rendimentoBruto = saldoBruto - totalInvestido;

            let ir = 0;
            let aliquotaInfo = { aliquota: 0, descricao: 'Isento de IR' };

            if (!isento) {
                aliquotaInfo = calcularAliquotaIR(prazoMeses);
                ir = rendimentoBruto * aliquotaInfo.aliquota;
            }

            const finalLiquido = saldoBruto - ir;
            const rentLiquida  = totalInvestido > 0 ? ((finalLiquido - totalInvestido) / totalInvestido * 100) : 0;
            const ganhoMensal  = (finalLiquido - totalInvestido) / prazoMeses;

            exibirResultados({
                totalInvestido, rendimentoBruto,
                ir, finalLiquido, rentLiquida, ganhoMensal,
                isento, aliquotaInfo
            });

        // ── RENDA VARIÁVEL ────────────────────────────────────────
        } else {
            const dyAnual         = parseFloat(document.getElementById('rv_dividendos').value)  / 100;
            const valorizacaoAnual = parseFloat(document.getElementById('rv_valorizacao').value) / 100;

            const dyMensal          = Math.pow(1 + dyAnual, 1 / 12) - 1;
            const valorizacaoMensal = Math.pow(1 + valorizacaoAnual, 1 / 12) - 1;

            let dividendosAcumulados = 0;

            for (let m = 1; m <= prazoMeses; m++) {
                saldoBruto += aporteMensal;
                const dividendos = saldoBruto * dyMensal;
                dividendosAcumulados += dividendos;
                saldoBruto = saldoBruto * (1 + valorizacaoMensal) + dividendos;
                totalInvestido += aporteMensal;

                evolucaoSaldo.push(saldoBruto);
                evolucaoInvestido.push(totalInvestido);
                if (m % Math.max(1, Math.floor(prazoMeses / 12)) === 0 || m === prazoMeses) {
                    labels.push('Mês ' + m);
                } else {
                    labels.push('');
                }
            }

            rendimentoBruto = saldoBruto - totalInvestido;

            // FIIs: dividendos isentos, mas valorização das cotas tributa 20% para PF
            const produto = document.getElementById('rv_produto').value;
            let ir = 0;
            let aliquotaInfo;

            if (produto === 'acoes') {
                const ganhoCapital = saldoBruto - totalInvestido - dividendosAcumulados;
                ir = Math.max(ganhoCapital, 0) * 0.15; // IRPF 15% sobre ganho de capital
                aliquotaInfo = { descricao: '15% sobre ganho de capital (ações)' };
            } else {
                // FIIs: JCP e dividendos isentos PF; projeção simplificada sem IR
                isento = true;
                aliquotaInfo = { descricao: 'Dividendos de FIIs isentos de IR para PF' };
            }

            const finalLiquido = saldoBruto - ir;
            const rentLiquida  = totalInvestido > 0 ? ((finalLiquido - totalInvestido) / totalInvestido * 100) : 0;
            const ganhoMensal  = (finalLiquido - totalInvestido) / prazoMeses;

            exibirResultados({
                totalInvestido, rendimentoBruto,
                ir, finalLiquido, rentLiquida, ganhoMensal,
                isento, aliquotaInfo
            });
        }

        renderizarGrafico(labels, evolucaoSaldo, evolucaoInvestido, prazoMeses);
    }

    // ── Atualiza DOM com resultados ────────────────────────────────
    function exibirResultados({ totalInvestido, rendimentoBruto, ir, finalLiquido, rentLiquida, ganhoMensal, isento, aliquotaInfo }) {
        document.getElementById('res_total_investido').textContent  = fmt(totalInvestido);
        document.getElementById('res_rendimento_bruto').textContent = fmt(rendimentoBruto);
        document.getElementById('res_final_liquido').textContent    = fmt(finalLiquido);
        document.getElementById('res_rentabilidade_pct').textContent = rentLiquida.toFixed(2).replace('.', ',') + '%';
        document.getElementById('res_mensal').textContent           = fmt(ganhoMensal);

        const badgeIsento = document.getElementById('badge_isento');
        const irEl        = document.getElementById('res_ir');
        const aliqTexto   = document.getElementById('aliquota_texto');

        if (isento) {
            irEl.textContent        = fmt(0);
            irEl.className          = 'valor-verde';
            badgeIsento.style.display = 'inline-block';
            aliqTexto.textContent   = aliquotaInfo.descricao;
        } else {
            irEl.textContent        = '−' + fmt(ir);
            irEl.className          = 'valor-vermelho';
            badgeIsento.style.display = 'none';
            aliqTexto.textContent   = aliquotaInfo.descricao || '';
        }
    }

    // ── Gráfico ───────────────────────────────────────────────────
    function renderizarGrafico(labels, evolucaoSaldo, evolucaoInvestido, prazoMeses) {
        // Reduz pontos para não sobrecarregar o eixo X
        const maxPontos = 13;
        const passo = Math.max(1, Math.floor(prazoMeses / maxPontos));

        const labelsReduzidos   = [];
        const saldoReduzido     = [];
        const investidoReduzido = [];

        for (let i = 0; i < labels.length; i += passo) {
            labelsReduzidos.push(labels[i]);
            saldoReduzido.push(evolucaoSaldo[i]);
            investidoReduzido.push(evolucaoInvestido[i]);
        }
        // Sempre inclui o último ponto
        const ult = labels.length - 1;
        if (labelsReduzidos[labelsReduzidos.length - 1] !== labels[ult]) {
            labelsReduzidos.push(labels[ult]);
            saldoReduzido.push(evolucaoSaldo[ult]);
            investidoReduzido.push(evolucaoInvestido[ult]);
        }

        const ctx = document.getElementById('graficoEvolucao').getContext('2d');

        if (graficoInstancia) graficoInstancia.destroy();

        graficoInstancia = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsReduzidos,
                datasets: [
                    {
                        label: 'Patrimônio Projetado',
                        data: saldoReduzido,
                        borderColor: '#ff5a00',
                        backgroundColor: 'rgba(255, 90, 0, 0.12)',
                        borderWidth: 2.5,
                        pointRadius: 3,
                        pointBackgroundColor: '#ff5a00',
                        fill: true,
                        tension: 0.4,
                    },
                    {
                        label: 'Total Investido',
                        data: investidoReduzido,
                        borderColor: '#a3a0a8',
                        backgroundColor: 'transparent',
                        borderWidth: 1.5,
                        pointRadius: 2,
                        borderDash: [5, 4],
                        fill: false,
                        tension: 0.1,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: {
                            color: '#a3a0a8',
                            font: { size: 11 },
                            boxWidth: 14,
                        }
                    },
                    tooltip: {
                        backgroundColor: '#25222b',
                        borderColor: '#332f3b',
                        borderWidth: 1,
                        titleColor: '#fff',
                        bodyColor: '#a3a0a8',
                        callbacks: {
                            label: ctx => ' ' + ctx.dataset.label + ': ' +
                                ctx.parsed.y.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#a3a0a8',
                            font: { size: 10 },
                            maxRotation: 0,
                        },
                        grid: { color: 'rgba(255,255,255,0.04)' }
                    },
                    y: {
                        ticks: {
                            color: '#a3a0a8',
                            font: { size: 10 },
                            callback: v => 'R$' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)
                        },
                        grid: { color: 'rgba(255,255,255,0.06)' }
                    }
                }
            }
        });
    }

    // Inicializa ao carregar
    window.addEventListener('DOMContentLoaded', () => {
        buscarCDI();
        calcularTudo();
    });
</script>
